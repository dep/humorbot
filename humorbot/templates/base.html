<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>humorbot - Simpsons & Futurama for Slack</title>
  <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #1a1a2e;
      background: #fafafa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a { color: #e8a817; text-decoration: none; }
    a:hover { text-decoration: underline; }

    nav {
      background: #1a1a2e;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    nav .brand {
      color: #fdd835;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      text-decoration: none;
    }

    nav .links { display: flex; gap: 1.5rem; }
    nav .links a { color: #aaa; font-size: 0.9rem; }
    nav .links a:hover { color: #fff; text-decoration: none; }

    main { flex: 1; }

    footer {
      background: #1a1a2e;
      color: #666;
      text-align: center;
      padding: 1.5rem;
      font-size: 0.85rem;
      margin-top: auto;
    }

    footer a { color: #888; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <a class="brand" href="/">humorbot</a>
    <div class="links">
      <a href="/usage">Usage</a>
      <a href="/support">Support</a>
      <a href="/terms">Terms</a>
      <a href="/privacy">Privacy</a>
      <a href="https://github.com/dep/humorbot">GitHub</a>
      <a href="https://x.com/dep">X</a>
    </div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <p>Originally built by <a href="https://github.com/snare/humorbot">snare</a>. Modernized 2026. Powered by <a href="https://frinkiac.com">Frinkiac</a> & <a href="https://morbotron.com">Morbotron</a>.</p>
  </footer>
</body>
</html>
